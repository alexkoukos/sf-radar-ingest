name: Keepalive

# Fully decoupled from ingest.yml: this must keep pinging PostgREST on its
# own schedule even if the parser breaks, so a broken scraper can never
# silently let the Supabase free-tier project auto-pause from inactivity
# (7 days idle -> HTTP 540 on every request, including from the frontend).
on:
  schedule:
    - cron: "0 12 * * *"
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping PostgREST
        run: |
          status=$(curl -sS -o /dev/null -w "%{http_code}" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/events?select=api_id&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}")
          echo "PostgREST responded $status"
          if [ "$status" -ge 300 ]; then
            exit 1
          fi
